# Netlify build & deploy configuration for Silkpedi
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Pin Node to a version Vite 6 supports (avoids surprises if Netlify changes its default)
  NODE_VERSION = "20"

# Single-page-app fallback: every route serves index.html so client-side
# navigation and deep links don't 404. (Harmless for this one-page site,
# and future-proofs it if routes are ever added.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
